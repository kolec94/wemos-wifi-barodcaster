<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>D1 Mini Serial Dashboard</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #14161c;
    --panel: #1b1e27;
    --border: #2a2e3a;
    --text: #e6e6e6;
    --dim: #8890a0;
    --accent: #4fd1c5;
    --warn: #e94560;
    --ok: #4fd17d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, Segoe UI, Arial, sans-serif;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 1.05rem; margin: 0; color: var(--text); }
  header .hint { color: var(--dim); font-size: 0.8rem; }
  .grid {
    display: flex; gap: 1px; background: var(--border);
    height: calc(100vh - 54px);
  }
  .panel {
    flex: 1 1 0; min-width: 0;
    background: var(--panel);
    display: flex; flex-direction: column;
  }
  .panel-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .panel-head input[type=text] {
    background: transparent; border: none; border-bottom: 1px dashed var(--border);
    color: var(--text); font-size: 0.95rem; font-weight: 600; padding: 2px 4px;
    width: 160px;
  }
  .panel-head input[type=text]:focus { outline: none; border-bottom-color: var(--accent); }
  .panel-head input.port-input { width: 70px; color: var(--accent); font-weight: 600; }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--dim); flex: none;
  }
  .status-dot.connected { background: var(--ok); }
  .status-dot.error { background: var(--warn); }
  .status-text { font-size: 0.75rem; color: var(--dim); }
  .spacer { flex: 1; }
  button {
    background: #262a36; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  button:disabled:hover { border-color: var(--border); }
  button.danger:hover { border-color: var(--warn); }
  .log {
    flex: 1; overflow-y: auto; padding: 10px 14px;
    font-family: "SF Mono", Consolas, "Courier New", monospace;
    font-size: 0.82rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }
  .log .line { color: var(--text); }
  .log .line.stamp { color: var(--dim); }
  .log .sys { color: var(--accent); font-style: italic; }
  .log .err { color: var(--warn); }
  .footer-row {
    padding: 6px 14px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .footer-row label { font-size: 0.75rem; color: var(--dim); display: flex; align-items: center; gap: 5px; }
  .counter { font-size: 0.75rem; color: var(--dim); margin-left: auto; }
  .unsupported {
    margin: 40px auto; max-width: 480px; text-align: center; color: var(--dim);
    padding: 20px; border: 1px solid var(--border); border-radius: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>D1 Mini Serial Dashboard</h1>
  <span class="hint">Web Serial — Chrome/Edge only. Each panel connects independently at 115200 baud.</span>
</header>

<div class="grid" id="grid"></div>

<template id="panel-template">
  <div class="panel">
    <div class="panel-head">
      <span class="status-dot"></span>
      <input type="text" class="name-input" spellcheck="false">
      <input type="text" class="port-input" placeholder="COM…" spellcheck="false" title="Windows shows this in the port picker dialog — the page can't read it back, so type it in once">
      <span class="status-text">disconnected</span>
      <div class="spacer"></div>
      <button class="connect-btn">Connect</button>
      <button class="disconnect-btn" disabled>Disconnect</button>
      <button class="clear-btn">Clear</button>
    </div>
    <div class="log"></div>
    <div class="footer-row">
      <label><input type="checkbox" class="autoscroll" checked> autoscroll</label>
      <label><input type="checkbox" class="timestamps"> timestamps</label>
      <span class="counter">0 lines</span>
    </div>
  </div>
</template>

<script>
if (!('serial' in navigator)) {
  document.getElementById('grid').innerHTML =
    '<div class="unsupported">Web Serial API not available.<br><br>' +
    'Open this file in <strong>Chrome</strong> or <strong>Edge</strong> ' +
    '(not as a claude.ai artifact, and not in Firefox/Safari) — ' +
    'it needs direct top-level access to talk to a COM port.</div>';
} else {
  const grid = document.getElementById('grid');
  const tpl = document.getElementById('panel-template');

  function makePanel(defaultName) {
    const node = tpl.content.cloneNode(true);
    const panel = node.querySelector('.panel');
    grid.appendChild(node);

    const dot        = panel.querySelector('.status-dot');
    const nameInput   = panel.querySelector('.name-input');
    const portInput   = panel.querySelector('.port-input');
    const statusText  = panel.querySelector('.status-text');
    const connectBtn  = panel.querySelector('.connect-btn');
    const disconnectBtn = panel.querySelector('.disconnect-btn');
    const clearBtn    = panel.querySelector('.clear-btn');
    const logEl       = panel.querySelector('.log');
    const autoscroll  = panel.querySelector('.autoscroll');
    const timestamps  = panel.querySelector('.timestamps');
    const counter     = panel.querySelector('.counter');

    nameInput.value = defaultName;

    let port = null;
    let reader = null;
    let keepReading = false;
    let lineCount = 0;
    let tearingDown = false;
    let lastState = '';
    let lastLabel = 'disconnected';

    // The Web Serial API deliberately never exposes the OS port path (e.g.
    // "COM12") back to the page — only USB vendor/product IDs, which are
    // identical for both boards here since they use the same CH340 chip.
    // So the port number is a manually-typed label, not something read from
    // the connection; this just appends it to the status line for visibility.
    function portSuffix() {
      const v = portInput.value.trim();
      return v ? ' — ' + v : '';
    }

    function setStatus(state, label) {
      lastState = state;
      lastLabel = label;
      dot.className = 'status-dot' + (state ? ' ' + state : '');
      statusText.textContent = label + (state === 'connected' ? portSuffix() : '');
    }

    portInput.addEventListener('input', () => setStatus(lastState, lastLabel));

    function appendLine(text, cls) {
      const div = document.createElement('div');
      div.className = 'line' + (cls ? ' ' + cls : '');
      if (timestamps.checked) {
        const t = new Date().toLocaleTimeString('en-US', { hour12: false }) +
                  '.' + String(new Date().getMilliseconds()).padStart(3, '0');
        const stamp = document.createElement('span');
        stamp.className = 'stamp';
        stamp.textContent = '[' + t + '] ';
        div.appendChild(stamp);
      }
      div.appendChild(document.createTextNode(text));
      logEl.appendChild(div);
      lineCount++;
      counter.textContent = lineCount + ' lines';
      if (autoscroll.checked) logEl.scrollTop = logEl.scrollHeight;
    }

    async function connect() {
      if (port) return; // already connected, or mid-teardown from a previous session
      try {
        const chosen = await navigator.serial.requestPort();
        await chosen.open({ baudRate: 115200 });
        port = chosen;
        keepReading = true;
        setStatus('connected', 'connected @115200');
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        appendLine('-- connected' + portSuffix() + ' --', 'sys');
        readLoop();
      } catch (err) {
        if (err.name !== 'NotFoundError') {
          appendLine('connect error: ' + err.message, 'err');
        }
      }
    }

    // Reads raw bytes directly off port.readable (no pipeTo/TextDecoderStream
    // in between) so there is only ever one lock to manage, and teardown()
    // can release + close in a single, race-free sequence.
    async function readLoop() {
      const decoder = new TextDecoder();
      reader = port.readable.getReader();
      let buf = '';
      try {
        while (keepReading) {
          const { value, done } = await reader.read();
          if (done) break;
          if (value) {
            buf += decoder.decode(value, { stream: true });
            let idx;
            while ((idx = buf.indexOf('\n')) >= 0) {
              const rawLine = buf.slice(0, idx).replace(/\r$/, '');
              buf = buf.slice(idx + 1);
              if (rawLine.length) appendLine(rawLine);
            }
          }
        }
      } catch (err) {
        // A yanked cable surfaces here as a read error (e.g. "device has
        // been lost") rather than through the reader.cancel() path below.
        appendLine('read error: ' + err.message, 'err');
      } finally {
        await teardown();
      }
    }

    // Single idempotent teardown path for both "Disconnect" clicks and the
    // read loop ending on its own (cable pulled, device reset, etc). Always
    // releases the reader lock and closes the port in the same order, so
    // there's never a race between a lingering lock and port.close().
    async function teardown() {
      if (tearingDown) return;
      tearingDown = true;
      keepReading = false;

      if (reader) {
        try { await reader.cancel(); } catch (err) { /* already gone, fine */ }
        try { reader.releaseLock(); } catch (err) { /* already released */ }
        reader = null;
      }
      if (port) {
        try { await port.close(); } catch (err) { /* device likely unplugged */ }
        port = null;
      }

      appendLine('-- disconnected --', 'sys');
      setStatus('', 'disconnected');
      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
      tearingDown = false;
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', () => { teardown(); });
    clearBtn.addEventListener('click', () => {
      logEl.innerHTML = '';
      lineCount = 0;
      counter.textContent = '0 lines';
    });

    navigator.serial.addEventListener('disconnect', (e) => {
      // Physical unplug: the pending reader.read() in readLoop will also
      // reject shortly and route through the same teardown(), this just
      // gives immediate UI feedback rather than waiting on that rejection.
      if (e.target === port) {
        setStatus('error', 'device unplugged');
      }
    });
  }

  makePanel('DUT (Flooder)');
  makePanel('Instrument (Counter)');
}
</script>

</body>
</html>
